<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEMO | Vacaciones Adarsa</title>
    <!-- Librerías Externas -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/shift-away.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f8fafc; 
            overflow: hidden; 
            touch-action: manipulation;
        }
        
        .fc-day-sun, .fc-day-sat { background-color: #fff1f2 !important; }
        .fc-event { 
            border: none !important; 
            margin: 1px 0 !important; 
            border-radius: 4px !important; 
            padding: 2px 4px !important;
        }
        .fc-event-main { 
            font-weight: 700 !important; 
            font-size: 0.6rem !important; 
            color: white !important;
        }
        
        #sidebar {
            transition: transform 0.3s ease-in-out;
            z-index: 100;
        }
        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: 280px;
                transform: translateX(-100%);
                box-shadow: 20px 0 50px rgba(0,0,0,0.1);
            }
            #sidebar.open { transform: translateX(0); }
            .fc-toolbar-title { font-size: 1.1rem !important; }
        }

        #sidebarOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            z-index: 90;
        }
        #sidebarOverlay.show { display: block; }

        #toast { position: fixed; top: 20px; right: 20px; left: 20px; md:left: auto; z-index: 2000; transform: translateY(-150%); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #toast.show { transform: translateY(0); }
        
        .type-btn { @apply flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-slate-100 transition-all active:scale-90 bg-white; }
        .type-btn-active { @apply border-blue-600 bg-blue-50 ring-4 ring-blue-100; }
        .active-user { border-left: 4px solid #3b82f6; background: #eff6ff; }
        
        .fc-daygrid-day { cursor: pointer; }
        .fc-daygrid-day:active { background-color: #f1f5f9; }

        /* Estilos Panel Reporte */
        #reportPanel {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>

    <div id="toast" class="bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl font-bold text-sm flex items-center gap-3 border border-slate-700">
        <div id="toastIndicator" class="w-2 h-2 rounded-full bg-blue-500"></div>
        <span id="toastMsg" class="flex-1 text-center"></span>
    </div>

    <!-- Pantalla de Login -->
    <div id="loginScreen" class="fixed inset-0 bg-slate-950 flex items-center justify-center z-[200] p-6">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center border border-slate-800">
            <h1 class="text-3xl font-black text-slate-900 mb-6 italic uppercase">ADARSA</h1>
            <div class="space-y-4">
                <input type="text" id="user" value="admin" class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition-all font-medium" placeholder="Usuario">
                <input type="password" id="pass" value="metal2026" class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition-all font-medium" placeholder="Contraseña">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black active:scale-95 transition-transform uppercase tracking-widest">Entrar</button>
            </div>
        </div>
    </div>

    <div id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div id="mainApp" class="hidden h-screen flex flex-col md:flex-row overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="bg-white border-r border-slate-200 p-6 flex flex-col overflow-y-auto shrink-0">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-2xl font-black text-slate-900 italic">ADARSA</h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Torrelavega 2026</p>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden p-2 bg-slate-100 rounded-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>
            
            <div class="space-y-6 flex-grow">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-3">ADMINISTRACIÓN</label>
                    <div id="list-admin" class="space-y-1"></div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-3">TALLER</label>
                    <div id="list-taller" class="space-y-1"></div>
                </div>
            </div>
            <button onclick="toggleModoFestivos()" id="btnFestivos" class="mt-6 w-full py-4 border-2 border-red-100 text-red-500 rounded-2xl font-black text-[10px] uppercase tracking-widest active:bg-red-50">Configurar Festivos</button>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden bg-slate-50">
            <header class="bg-white border-b border-slate-200 px-4 py-3 md:px-6 md:py-4 flex justify-between items-center z-40 sticky top-0">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="md:hidden p-2 bg-slate-100 rounded-xl active:scale-90 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <div class="flex items-center bg-slate-100 p-1 rounded-xl">
                        <button onclick="navYear(-1)" class="p-2 hover:text-blue-600"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
                        <span id="displayYear" class="px-2 md:px-4 font-black text-sm md:text-lg italic">2026</span>
                        <button onclick="navYear(1)" class="p-2 hover:text-blue-600"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
                    </div>
                </div>
                
                <div class="flex items-center gap-2">
                    <h3 id="currentUserTitle" class="font-black text-xs md:text-xl text-slate-800 uppercase italic truncate max-w-[100px] md:max-w-none">Seleccione empleado</h3>
                    <button id="btnOpenReport" onclick="openReport()" class="hidden p-2 bg-blue-600 text-white rounded-xl shadow-lg shadow-blue-200 active:scale-90 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                    </button>
                </div>
            </header>
            
            <div class="flex-1 overflow-y-auto p-4 md:p-8">
                <div id="calendar" class="bg-white p-2 md:p-6 rounded-3xl shadow-sm border border-slate-200 mb-8"></div>
                <div id="historial" class="hidden pb-24">
                    <h4 class="font-black text-slate-800 text-sm uppercase mb-4 pl-2 border-l-4 border-blue-600">Historial</h4>
                    <div id="tableContainer" class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm overflow-x-auto text-[10px] md:text-xs">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-slate-400 font-black uppercase tracking-widest border-b border-slate-100">
                                <tr>
                                    <th class="p-4">Fecha</th>
                                    <th class="p-4">Tipo</th>
                                    <th class="p-4 text-right">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Registro -->
    <div id="modal" class="fixed inset-0 bg-slate-950/80 hidden items-center justify-center z-[150] backdrop-blur-sm p-4">
        <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm border border-slate-100">
            <h4 class="text-xl font-black text-slate-900 mb-6 text-center uppercase italic">Tipo de Registro</h4>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="selectType('vacaciones')" id="btn-vacaciones" class="type-btn"><span class="text-2xl">🏖️</span><span class="text-[9px] font-black uppercase mt-1">Vacaciones</span></button>
                <button onclick="selectType('baja')" id="btn-baja" class="type-btn"><span class="text-2xl">🤒</span><span class="text-[9px] font-black uppercase mt-1">Baja</span></button>
                <button onclick="selectType('curso')" id="btn-curso" class="type-btn"><span class="text-2xl">📚</span><span class="text-[9px] font-black uppercase mt-1">Curso</span></button>
                <button onclick="selectType('otros')" id="btn-otros" class="type-btn"><span class="text-2xl">📝</span><span class="text-[9px] font-black uppercase mt-1">Otros</span></button>
            </div>
            <div id="confirmActions" class="space-y-2 hidden">
                <button onclick="confirmSave(1.0)" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase active:scale-95 transition-transform">Día Completo</button>
                <button onclick="confirmSave(0.5)" class="w-full py-4 border-2 border-slate-100 text-slate-900 rounded-2xl font-black text-xs uppercase active:bg-slate-50">Media Jornada</button>
            </div>
            <button onclick="closeModal()" class="w-full mt-6 text-slate-400 text-[10px] font-black uppercase tracking-widest">Cerrar</button>
        </div>
    </div>

    <!-- Modal Reporte Analítico -->
    <div id="reportPanel" class="fixed inset-0 bg-slate-50 z-[250] hidden flex-col">
        <header class="bg-white border-b border-slate-200 p-6 flex justify-between items-center shrink-0">
            <div>
                <h2 id="reportUserName" class="text-2xl font-black text-slate-900 uppercase italic">Resumen</h2>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Análisis de Ausencias 2026</p>
            </div>
            <button onclick="closeReport()" class="p-4 bg-slate-100 rounded-2xl font-black text-xs uppercase active:scale-90 transition-all">Cerrar</button>
        </header>
        <div class="flex-1 overflow-y-auto p-6 space-y-8">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="reportStats">
                <!-- Inyectado dinámicamente -->
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] border border-slate-200 shadow-sm">
                <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-6">Distribución por Tipo (Días)</h3>
                <div class="h-[300px] w-full">
                    <canvas id="reportChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ibsztkfrkumibvllxhqn.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlic3p0a2Zya3VtaWJ2bGx4aHFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NzYxMTYsImV4cCI6MjA4NzQ1MjExNn0.igRwNr_mNV4NVWlo_DzpFZ3jbnMPvqmhlX7FRbs4bKs"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let calendar, currentUser, selectedInfo, currentYear = 2026, vacacionesData = [], selectedType = null, modoFestivos = false;
        let myChart = null;

        const employeeConfig = {
            "Raúl Villegas": { color: "#10b981", grupo: "admin" },
            "Igor Santamaría": { color: "#3b82f6", grupo: "admin" },
            "Adrián Gómez": { color: "#f59e0b", grupo: "admin" },
            "Nacho Galán": { color: "#8b5cf6", grupo: "admin" },
            "Jesús Fernández": { color: "#f97316", grupo: "taller" },
            "Luis Portilla": { color: "#06b6d4", grupo: "taller" },
            "Jorge Barreda": { color: "#f43f5e", grupo: "taller" }
        };

        const typeColors = { vacaciones: "#3b82f6", baja: "#64748b", curso: "#8b5cf6", otros: "#0ea5e9", festivo: "#ef4444" };
        const typeEmojis = { vacaciones: '🏖️', baja: '🤒', curso: '📚', otros: '📝', festivo: '🚩' };

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            document.getElementById('toastIndicator').className = isError ? 'w-2 h-2 rounded-full bg-red-500' : 'w-2 h-2 rounded-full bg-blue-500';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('sidebarOverlay');
            sb.classList.toggle('open');
            ov.classList.toggle('show');
        }

        function handleLogin() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            initApp();
        }

        async function initApp() {
            const isMobile = window.innerWidth < 768;
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: isMobile ? 'dayGridMonth' : 'multiMonthYear',
                initialDate: `${currentYear}-01-01`,
                locale: 'es',
                firstDay: 1,
                height: 'auto',
                selectable: true,
                unselectAuto: false,
                headerToolbar: isMobile ? { left: 'prev,next', center: 'title', right: '' } : false,
                dayMaxEvents: isMobile ? 2 : true,
                select: (info) => {
                    const target = modoFestivos ? 'FESTIVO' : currentUser;
                    if(!target) { calendar.unselect(); showToast("Seleccione empleado", true); return; }
                    selectedInfo = info;
                    if(modoFestivos) { selectedType = 'festivo'; confirmSave(0); } 
                    else { resetModal(); document.getElementById('modal').style.display = 'flex'; }
                },
                eventDidMount: (info) => {
                    tippy(info.el, { content: info.event.extendedProps.description, theme: 'adarsa', allowHTML: true });
                }
            });
            calendar.render();
            await fetchData();
        }

        async function fetchData() {
            const { data, error } = await supabaseClient.from('vacaciones_demo').select('*');
            if(!error) {
                vacacionesData = data || [];
                renderEvents();
                renderUserList();
                if(currentUser || modoFestivos) renderTable();
            }
        }

        function renderEvents() {
            calendar.removeAllEvents();
            const events = vacacionesData.filter(v => v.fecha_inicio.startsWith(currentYear)).map(v => {
                const t = v.tipo || 'vacaciones';
                const color = v.empleado === 'FESTIVO' ? typeColors['festivo'] : (employeeConfig[v.empleado]?.color || typeColors[t]);
                const nameShort = v.empleado === 'FESTIVO' ? 'FEST' : v.empleado.split(' ')[0];
                return {
                    id: v.id,
                    title: `${typeEmojis[t]} ${nameShort}`,
                    start: v.fecha_inicio,
                    allDay: true,
                    backgroundColor: color,
                    borderColor: color,
                    extendedProps: { description: `<strong>${v.empleado}</strong><br>${t.toUpperCase()}` }
                };
            });
            calendar.addEventSource(events);
        }

        function renderUserList() {
            ['admin', 'taller'].forEach(g => document.getElementById(`list-${g}`).innerHTML = '');
            Object.keys(employeeConfig).forEach(name => {
                const used = vacacionesData.filter(v => v.empleado === name && (v.tipo === 'vacaciones' || !v.tipo) && v.fecha_inicio.startsWith(currentYear)).reduce((s,v) => s + v.dias, 0);
                const html = `<div onclick="selectUser('${name}')" class="p-4 rounded-xl cursor-pointer transition-all active:scale-95 ${currentUser === name ? 'active-user' : 'hover:bg-slate-50'}">
                    <div class="flex justify-between text-[10px] font-bold mb-1"><span>${name}</span><span class="text-slate-400">${used.toFixed(1)}/25</span></div>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden"><div class="h-full transition-all duration-500" style="width:${(used/25)*100}%; background:${employeeConfig[name].color}"></div></div>
                </div>`;
                document.getElementById(`list-${employeeConfig[name].grupo}`).innerHTML += html;
            });
        }

        function selectUser(name) {
            if(modoFestivos) toggleModoFestivos();
            currentUser = name;
            document.getElementById('currentUserTitle').innerText = name;
            document.getElementById('historial').classList.remove('hidden');
            document.getElementById('btnOpenReport').classList.remove('hidden');
            if(window.innerWidth < 768) toggleSidebar();
            renderUserList();
            renderTable();
        }

        function selectType(t) {
            selectedType = t;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('type-btn-active'));
            document.getElementById(`btn-${t}`).classList.add('type-btn-active');
            document.getElementById('confirmActions').classList.remove('hidden');
        }

        function resetModal() {
            selectedType = null;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('type-btn-active'));
            document.getElementById('confirmActions').classList.add('hidden');
        }

        async function confirmSave(factor) {
            const target = modoFestivos ? 'FESTIVO' : currentUser;
            const inserts = [], deletes = [], updates = [];
            let current = new Date(selectedInfo.startStr + "T12:00:00");
            let end = new Date(selectedInfo.endStr + "T12:00:00");

            while(current < end) {
                const dStr = current.toISOString().split('T')[0];
                const dayOfWeek = current.getDay();
                if(modoFestivos || (dayOfWeek !== 0 && dayOfWeek !== 6)) {
                    const existing = vacacionesData.find(v => v.empleado === target && v.fecha_inicio === dStr);
                    if (existing) {
                        if (existing.tipo === selectedType) deletes.push(existing.id);
                        else updates.push({ id: existing.id, tipo: selectedType, dias: factor });
                    } else {
                        if(!modoFestivos && selectedType === 'vacaciones') {
                            const grupo = employeeConfig[currentUser].grupo;
                            const compis = vacacionesData.filter(v => v.fecha_inicio === dStr && (v.tipo === 'vacaciones' || !v.tipo) && v.empleado !== 'FESTIVO' && employeeConfig[v.empleado]?.grupo === grupo).length;
                            if(compis >= 1) { showToast(`Tope alcanzado en ${grupo} (${dStr})`, true); current.setDate(current.getDate() + 1); continue; }
                        }
                        inserts.push({ empleado: target, fecha_inicio: dStr, fecha_fin: dStr, tipo: selectedType, dias: factor });
                    }
                }
                current.setDate(current.getDate() + 1);
            }

            try {
                if (deletes.length) await supabaseClient.from('vacaciones_demo').delete().in('id', deletes);
                for (const u of updates) await supabaseClient.from('vacaciones_demo').update({ tipo: u.tipo, dias: u.dias }).eq('id', u.id);
                if (inserts.length) await supabaseClient.from('vacaciones_demo').insert(inserts);
                if (deletes.length || updates.length || inserts.length) { showToast("Sincronizado"); await fetchData(); }
            } catch (err) { showToast("Error de conexión", true); }
            closeModal();
        }

        function renderTable() {
            const target = modoFestivos ? 'FESTIVO' : currentUser;
            const filtered = vacacionesData.filter(v => v.empleado === target && v.fecha_inicio.startsWith(currentYear)).sort((a,b) => b.fecha_inicio.localeCompare(a.fecha_inicio));
            document.getElementById('tableBody').innerHTML = filtered.length ? filtered.map(v => {
                const t = v.tipo || 'vacaciones';
                return `<tr class="border-b border-slate-50">
                    <td class="p-4 font-bold text-slate-700">${v.fecha_inicio.split('-').reverse().slice(0,2).join('/')}</td>
                    <td class="p-4 text-slate-500 uppercase font-black">${typeEmojis[t]} ${t}</td>
                    <td class="p-4 text-right"><button onclick="deleteRow('${v.id}')" class="text-red-400 active:scale-90 transition-transform px-2">✕</button></td>
                </tr>`;
            }).join('') : '<tr><td colspan="3" class="p-8 text-center text-slate-300 italic">No hay registros</td></tr>';
        }

        async function deleteRow(id) {
            const { error } = await supabaseClient.from('vacaciones_demo').delete().eq('id', id);
            if(!error) { showToast("Eliminado"); await fetchData(); }
        }

        function toggleModoFestivos() {
            modoFestivos = !modoFestivos;
            currentUser = null;
            document.getElementById('btnOpenReport').classList.add('hidden');
            document.getElementById('btnFestivos').className = modoFestivos ? 'mt-6 w-full py-4 bg-red-600 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest' : 'mt-6 w-full py-4 border-2 border-red-100 text-red-500 rounded-2xl font-black text-[10px] uppercase tracking-widest';
            document.getElementById('currentUserTitle').innerText = modoFestivos ? "MODO FESTIVOS" : "Seleccione empleado";
            document.getElementById('historial').classList.toggle('hidden', !modoFestivos);
            if(window.innerWidth < 768) toggleSidebar();
            renderUserList();
            renderTable();
        }

        function openReport() {
            if (!currentUser) return;
            document.getElementById('reportUserName').innerText = currentUser;
            document.getElementById('reportPanel').style.display = 'flex';
            
            const stats = { vacaciones: 0, baja: 0, curso: 0, otros: 0 };
            vacacionesData.filter(v => v.empleado === currentUser && v.fecha_inicio.startsWith(currentYear))
                .forEach(v => { stats[v.tipo || 'vacaciones'] += v.dias; });

            const statsContainer = document.getElementById('reportStats');
            statsContainer.innerHTML = Object.keys(stats).map(key => `
                <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">${key}</p>
                    <p class="text-2xl font-black text-slate-900">${stats[key].toFixed(1)} <span class="text-xs text-slate-300">días</span></p>
                </div>
            `).join('');

            if (myChart) myChart.destroy();
            const ctx = document.getElementById('reportChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['VACACIONES', 'BAJAS', 'CURSOS', 'OTROS'],
                    datasets: [{
                        label: 'Días Consumidos',
                        data: [stats.vacaciones, stats.baja, stats.curso, stats.otros],
                        backgroundColor: [typeColors.vacaciones, typeColors.baja, typeColors.curso, typeColors.otros],
                        borderRadius: 12,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { display: false }, ticks: { font: { weight: '800' } } },
                        x: { grid: { display: false }, ticks: { font: { weight: '800', size: 10 } } }
                    }
                }
            });
        }

        function closeReport() { document.getElementById('reportPanel').style.display = 'none'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; calendar.unselect(); }
        function navYear(n) { currentYear += n; document.getElementById('displayYear').innerText = currentYear; calendar.gotoDate(`${currentYear}-01-01`); fetchData(); }
    </script>
</body>
</html>
